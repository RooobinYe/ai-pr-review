name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build ai-pr-review
        run: go build -o ai-pr-review ./cmd/ai-pr-review

      - name: Run AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.BASE_URL }}
          ANTHROPIC_MODEL: ${{ vars.MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./ai-pr-review \
            --pr "${{ github.event.pull_request.html_url }}" \
            --format json \
            --quiet \
            --fail-on high
